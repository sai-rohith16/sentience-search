<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentience Search - Movie Discovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #1e90ff;
            --dark-bg: #050505;
            --dark-card: #0a1420;
            --text-light: #e0e0e0;
        }

        html, body {
            background: radial-gradient(ellipse at top center, #0a192f 0%, #050505 100%);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .font-bebas { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.1em; }

        .sentience-title {
            text-shadow: 0 0 20px rgba(30, 144, 255, 0.6);
            background: linear-gradient(to right, #ffffff, #60a5fa);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes shimmer {
            0%, 100% { border-color: rgba(30, 144, 255, 0.3); box-shadow: 0 0 20px rgba(30, 144, 255, 0.1); }
            50% { border-color: rgba(30, 144, 255, 0.8); box-shadow: 0 0 30px rgba(30, 144, 255, 0.3); }
        }

        .shimmer-input { animation: shimmer 3s ease-in-out infinite; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-up { animation: slideUp 0.6s ease-out forwards; opacity: 0; }

        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(30, 144, 255, 0.2);
        }

        .movie-card {
            background: rgba(10, 20, 32, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
        }

        .movie-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(30, 144, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(30, 144, 255, 0.2);
        }

        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }
    </style>
</head>
<body class="relative">
    <div class="relative z-10 min-h-screen flex flex-col">
        <section class="flex flex-col justify-center items-center text-center pt-20 px-4">
            <div class="w-full max-w-3xl mx-auto">
                <h1 class="font-bebas text-6xl sm:text-7xl lg:text-8xl mb-12 sentience-title">
                    SENTIENCE <span class="text-blue-400">SEARCH</span>
                </h1>

                <div class="relative mb-12">
                    <input
                        type="text"
                        id="searchInput"
                        placeholder="Describe a vibe, a feeling, or a philosophy..."
                        class="glass-input shimmer-input w-full px-8 py-6 rounded-2xl text-white placeholder-gray-500 transition-all duration-300 text-xl"
                        aria-label="Movie search query"
                    />
                    <button
                        id="searchBtn"
                        class="absolute right-5 top-1/2 -translate-y-1/2 p-3 rounded-xl hover:bg-blue-500/20 transition-all"
                        aria-label="Search"
                    >
                        <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </button>
                </div>

                <div id="loadingContainer" class="hidden flex flex-col items-center gap-6">
                    <div class="w-16 h-16 border-4 border-blue-400 border-t-transparent rounded-full spin"></div>
                    <p class="text-blue-400 font-bebas text-xl tracking-widest animate-pulse">ANALYZING SENTIENCE...</p>
                </div>

                <div id="errorContainer" class="hidden bg-red-500/10 border border-red-500/30 rounded-xl p-5 mb-8 text-red-400"></div>
            </div>
        </section>

        <section class="relative z-10 flex-grow px-8 pb-20 mt-12">
            <div class="w-full max-w-7xl mx-auto">
                <h2 id="resultsTitle" class="font-bebas text-3xl text-white/50 mb-10 tracking-widest hidden">RECOVERED DATA POINTS</h2>
                <div id="moviesGrid" class="movies-grid"></div>
                
                <div id="emptyState" class="text-center py-32 opacity-20">
                    <p class="text-2xl tracking-[1em] font-light">AWAITING INPUT</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000/search';

        async function performSearch() {
            const query = document.getElementById('searchInput').value;
            const grid = document.getElementById('moviesGrid');
            const loader = document.getElementById('loadingContainer');
            const empty = document.getElementById('emptyState');
            const error = document.getElementById('errorContainer');
            const title = document.getElementById('resultsTitle');

            if (!query.trim()) return;

            loader.classList.remove('hidden');
            grid.innerHTML = '';
            empty.classList.add('hidden');
            title.classList.add('hidden');
            error.classList.add('hidden');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query }),
                });

                if (!response.ok) throw new Error('Engine Response Failure');

                const data = await response.json();
                loader.classList.add('hidden');

                if (!data || data.length === 0) {
                    empty.innerHTML = '<p class="text-gray-400 tracking-widest uppercase">NO MATCHING FREQUENCIES FOUND</p>';
                    empty.classList.remove('hidden');
                    return;
                }

                title.classList.remove('hidden');
                data.forEach((movie, index) => {
                    const card = document.createElement('div');
                    card.className = 'movie-card p-8 rounded-2xl slide-up';
                    card.style.animationDelay = `${index * 0.15}s`;

                    card.innerHTML = `
                        <h3 class="font-bebas text-3xl text-white mb-3 tracking-wide leading-tight">${movie.title}</h3>
                        <div class="flex justify-between text-xs text-blue-400/60 mb-6 font-bold tracking-widest border-b border-white/5 pb-2">
                            <span>RATING: ${movie.vote_average || 'N/A'}</span>
                            <span>${movie.runtime ? movie.runtime + ' MIN' : '---'}</span>
                        </div>
                        <p class="text-gray-400 text-sm leading-relaxed">${movie.overview}</p>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                loader.classList.add('hidden');
                error.classList.remove('hidden');
                error.textContent = "CRITICAL ERROR: Connection to C++ Engine severed. Ensure FastAPI is active.";
            }
        }

        document.getElementById('searchBtn').onclick = performSearch;
        document.getElementById('searchInput').onkeypress = (e) => { 
            if(e.key === 'Enter') performSearch(); 
        };
    </script>
</body>
</html>
